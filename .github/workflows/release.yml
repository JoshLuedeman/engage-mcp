name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write
  packages: write
  id-token: write   # for npm provenance

jobs:
  verify:
    name: Lint + test + build + smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run smoke

  publish-npm:
    name: Publish to npmjs.org
    needs: verify
    runs-on: ubuntu-latest
    # Skip cleanly if no NPM_TOKEN is configured — the GH-Packages and
    # release jobs still run so the tag isn't wasted.
    if: ${{ vars.NPM_PUBLISH_ENABLED == 'true' || secrets.NPM_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - name: Publish (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-gpr:
    name: Publish to GitHub Packages
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@joshluedeman'
      - run: npm ci
      - run: npm run build
      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  github-release:
    name: Create GitHub Release
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          version="${tag#v}"
          # Pull the section for this version out of CHANGELOG.md.
          awk -v ver="$version" '
            $0 ~ "^## \\["ver"\\]" { capture=1; next }
            capture && /^## \[/        { exit }
            capture                    { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release ${tag}" > release-notes.md
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: ${{ steps.notes.outputs.tag }}
          body_path: release-notes.md
          draft: false
          prerelease: false
