name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    name: lint + typecheck + test + build (node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: ['20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Startup smoke (initialize + tools/list)
        env:
          # Real values flow in from GitHub Secrets when set; otherwise
          # fall back to Microsoft Azure CLI's public client id + the
          # Microsoft corp tenant. The server only contacts Azure when
          # a tool that requires auth is invoked, so smoke can run with
          # any non-empty pair of GUIDs.
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID || '04b07795-8ddb-461a-bbee-02f9e1bf7b46' }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID || '72f988bf-86f1-41af-91ab-2d7cd011db47' }}
        run: npm run smoke
